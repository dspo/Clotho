[package]
name = "cosmic-weather"
version = "0.1.0"
description = "A Tauri demo for tauri-plugin-agent-runtime"
edition = "2021"

[lib]
name = "cosmic_weather_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
async-trait = "0.1"
serde_json = "1"
tauri = { version = "2", features = [] }
tauri-plugin-agent-runtime = { path = "../../../src-tauri/crates/tauri-plugin-agent-runtime" }

[patch.crates-io]
winres = { path = "../../../src-tauri/patches/winres" }
tokio-tungstenite = { git = "https://github.com/openai-oss-forks/tokio-tungstenite", rev = "132f5b39c862e3a970f731d709608b3e6276d5f6" }
tungstenite = { git = "https://github.com/openai-oss-forks/tungstenite-rs", rev = "9200079d3b54a1ff51072e24d81fd354f085156f" }

[patch."ssh://git@github.com/openai-oss-forks/tungstenite-rs.git"]
tungstenite = { git = "https://github.com/openai-oss-forks/tungstenite-rs", rev = "9200079d3b54a1ff51072e24d81fd354f085156f" }
