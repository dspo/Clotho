"$schema" = "schemas/schema.json"

[[permission]]
identifier = "debug"
description = """
Debug agent runtime permissions: operator access plus interruption for local debugging and recovery.
"""
commands.allow = [
  "list_threads",
  "get_thread_snapshot",
  "create_thread",
  "start_turn",
  "resume_turn_stream",
  "cancel_turn",
  "submit_runtime_request",
  "list_configs",
  "resolve_config",
  "get_runtime_catalog",
]
