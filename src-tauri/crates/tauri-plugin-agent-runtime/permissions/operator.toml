"$schema" = "schemas/schema.json"

[[permission]]
identifier = "operator"
description = """
Operator agent runtime permissions: interactive turn lifecycle plus read-only inspection.
"""
commands.allow = [
  "list_threads",
  "get_thread_snapshot",
  "create_thread",
  "start_turn",
  "resume_turn_stream",
  "cancel_turn",
  "submit_runtime_request",
  "list_config_files",
  "resolve_config_profile",
  "get_runtime_catalog",
]
