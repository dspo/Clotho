"$schema" = "schemas/schema.json"

[[permission]]
identifier = "read-only"
description = """
Read-only agent runtime permissions: list threads, inspect snapshots, list configs, and inspect catalog.
"""
commands.allow = [
  "list_threads",
  "get_thread_snapshot",
  "list_configs",
  "resolve_config",
  "get_runtime_catalog",
]
